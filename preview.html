<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预览 - 阿奇的资料站</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .preview-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .preview-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .preview-toolbar h1 {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
        }

        .preview-toolbar-actions {
            display: flex;
            gap: 10px;
        }

        .preview-iframe-wrap {
            width: 100%;
            height: 80vh;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            background: #fff;
        }

        .preview-iframe-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .preview-fallback {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }

        .preview-fallback .emoji {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .preview-fallback h2 {
            margin-bottom: 8px;
        }

        .preview-fallback p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .preview-iframe-wrap {
                height: 60vh;
            }
            .preview-toolbar h1 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">🍎 阿奇的资料站</a>
                <ul class="nav-links">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="materials.html">资料</a></li>
                    <li><a href="gallery.html">图库</a></li>
                    <li><a href="videos.html">视频</a></li>
                </ul>
                <button class="menu-toggle" aria-label="菜单">☰</button>
            </nav>
        </div>
    </header>

    <section class="section">
        <div class="preview-container">
            <div id="preview-content">
                <!-- JS 动态加载 -->
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 阿奇的资料站 · Made with 🍎</p>
        </div>
    </footer>

    <script>
        // 从 URL 参数获取文件路径 ?file=xxx
        const params = new URLSearchParams(window.location.search);
        const fileUrl = params.get('file');
        const fileName = params.get('name') || '文档';

        const container = document.getElementById('preview-content');

        if (!fileUrl) {
            container.innerHTML = `
                <div class="preview-fallback" style="display:block">
                    <div class="emoji">📄</div>
                    <h2>没有指定文件</h2>
                    <p>请通过 ?file= 参数指定要预览的文件路径。</p>
                    <a href="materials.html" class="btn btn-primary">返回资料页</a>
                </div>
            `;
        } else {
            // 完整的文件 URL（如果是相对路径，补全为绝对路径）
            const fullUrl = fileUrl.startsWith('http') ? fileUrl : window.location.origin + '/' + fileUrl.replace(/^\//, '');

            // 用于 Office Online 预览的 URL（需 HTTPS）
            const officeViewerUrl = 'https://view.officeapps.live.com/op/view.aspx?src=' + encodeURIComponent(fullUrl);

            container.innerHTML = `
                <div class="preview-toolbar">
                    <h1>📄 ${fileName}</h1>
                    <div class="preview-toolbar-actions">
                        <a href="${fullUrl}" class="btn btn-secondary" download>⬇️ 下载</a>
                        <a href="materials.html" class="btn btn-secondary">← 返回</a>
                    </div>
                </div>
                <div class="preview-iframe-wrap">
                    <iframe src="${officeViewerUrl}" frameborder="0" allowfullscreen></iframe>
                </div>
                <p style="margin-top:12px;color:var(--text-secondary);font-size:0.85rem;text-align:center;">
                    💡 预览由 Microsoft Office Online 提供支持 · 如果加载较慢请耐心等待
                </p>
            `;
        }

        // 导航高亮
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            const matLink = document.querySelector('.nav-links a[href="materials.html"]');
            if (matLink) matLink.classList.add('active');
        });
    </script>
</body>
</html>
