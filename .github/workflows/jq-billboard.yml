name: 龙虎榜数据自动化

on:
  schedule:
    # 每个交易日收盘后运行（北京时间 20:00 = UTC 12:00）
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    inputs:
      anchor_date:
        description: '锚点日期（留空=最新交易日，格式 YYYY-MM-DD）'
        required: false
        default: ''
      data_days:
        description: '数据回溯天数'
        required: false
        default: '255'

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 诊断环境变量
        env:
          JQ_USER: ${{ secrets.JQ_USER }}
          JQ_PASS: ${{ secrets.JQ_PASS }}
        run: |
          echo "=== 环境变量诊断 ==="
          if [ -z "$JQ_USER" ]; then echo "[ERR] JQ_USER 为空"; else echo "[OK] JQ_USER 已设置 (长度: ${#JQ_USER})"; fi
          if [ -z "$JQ_PASS" ]; then echo "[ERR] JQ_PASS 为空"; else echo "[OK] JQ_PASS 已设置 (长度: ${#JQ_PASS})"; fi

      - name: 测试 JQData 连通性
        env:
          JQ_USER: ${{ secrets.JQ_USER }}
          JQ_PASS: ${{ secrets.JQ_PASS }}
          PYTHONIOENCODING: utf-8
        run: |
          python -u -c "
import os, sys
from jqdatasdk import *
try:
    u = os.environ['JQ_USER']
    p = os.environ['JQ_PASS']
    auth(u, p)
    print('[OK] auth success')
    days = get_trade_days(end_date=None, count=5)
    print(f'[OK] 交易日数据: {len(days)} 天, 最新: {days[-1]}')
except Exception as e:
    print(f'[ERR] {e}')
    sys.exit(1)
"

      - name: 运行龙虎榜分析
        env:
          JQ_USER: ${{ secrets.JQ_USER }}
          JQ_PASS: ${{ secrets.JQ_PASS }}
          OUTPUT_DIR: 'data/billboard'
          OUTPUT_FORMAT: 'json'
          PYTHONIOENCODING: utf-8
        run: |
          mkdir -p data/billboard
          python -u scripts/billboard_analysis.py 2>&1 | tee data/billboard/run.log
          echo "退出码: ${PIPESTATUS[0]}"

      - name: 提交数据到仓库
        run: |
          git config user.name "billboard-bot"
          git config user.email "bot@github.com"
          mkdir -p data/billboard
          git add data/billboard/
          if git diff --quiet && git diff --staged --quiet; then
            echo "[INFO] 无任何变化，跳过提交"
          else
            git commit -m "auto: 龙虎榜数据更新 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
            git config http.proxy http://127.0.0.1:10809
            git config https.proxy http://127.0.0.1:10809
            git push
            echo "[OK] 数据已推送至仓库"
          fi
