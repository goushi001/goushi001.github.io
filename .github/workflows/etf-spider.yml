name: ETF 份额每日采集

on:
  schedule:
    # 每天 UTC 19:00 = 北京时间 凌晨 3:00
    - cron: '0 19 * * *'
  workflow_dispatch:   # 支持手动触发（方便测试）

concurrency:
  group: etf-spider-daily
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 用于 git push 回仓库
      actions: read      # 用于读取 artifact

    steps:
      # ── 1. 拉取仓库 ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 安装 Python ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # ── 3. 安装 Google Chrome（Selenium 需要） ──
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── 4. 安装 Python 依赖 ──
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install selenium openpyxl pandas requests webdriver-manager

      # ── 5. 运行爬虫 ──
      - name: Run ETF spider
        id: run_spider
        run: |
          echo "🕷️ 开始运行 ETF 采集脚本..."
          python etf_spider.py 2>&1 | tee etf-spider.log
          echo "status=done" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── 6. 提交并推送更新的 Excel 文件 ──
      - name: Commit and push updated Excel
        if: steps.run_spider.outputs.status == 'done'
        run: |
          # 配置 git 身份（用的是 GitHub 的 noreply 邮箱，保护隐私）
          git config user.name "ETF Spider Bot"
          git config user.email "goushi001@users.noreply.github.com"

          # 添加 Excel 文件到暂存区
          git add assets/posts/ETF份额统计.xlsx

          # 如果有变更则提交推送
          if git diff --cached --quiet; then
            echo "📭 份额数据无变化，跳过提交"
          else
            git commit -m "auto: 更新ETF份额数据 $(date +'%Y-%m-%d' --date='TZ=\"Asia/Shanghai\" now')"
            git push
            echo "🚀 Excel 已推送到仓库"
          fi

      # ── 7. 保留运行日志（供排查使用） ──
      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-spider-log
          path: etf-spider.log
          retention-days: 30

      # ── 8. 失败时输出摘要到日志 ──
      - name: Check run status
        if: steps.run_spider.outcome != 'success'
        run: |
          echo "❌❌❌ ETF 采集脚本运行失败 ❌❌❌"
          echo "请查看上面的日志或下载 etf-spider-log artifact 排查问题。"
          echo ""
          echo "📌 常见原因："
          echo "  1. 上交所/深交所网站改版"
          echo "  2. Excel 文件格式有变化"
          echo "  3. GitHub Actions 环境变更"
